version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: zelatech_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: zelatech_db
    ports:
      - "3306:3306"
    volumes:
      - zelatech_mysql_data:/var/lib/mysql

volumes:
  zelatech_mysql_data:
